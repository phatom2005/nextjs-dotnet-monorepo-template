name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- KIỂM TRA BACKEND ---
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build
        run: dotnet build project/backend/ProjectTemplate-WebApp/ProjectTemplate-WebApp.sln

  # --- KIỂM TRA FRONTEND ---
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          cd project/frontend
          npm ci
          npm run build

  # --- QUÉT BẢO MẬT (SNYK) ---
  security-scan:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/node@master
        with:
          args: --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # --- ĐÓNG GÓI & ĐẨY LÊN DOCKER HUB (CD) ---
  build-and-push:
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./project/backend/ProjectTemplate-WebApp/ProjectTemplate-WebApp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./project/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-frontend:latest